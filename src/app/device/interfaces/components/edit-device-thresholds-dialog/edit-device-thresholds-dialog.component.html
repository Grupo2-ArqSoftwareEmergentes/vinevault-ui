<div class="thresholds-modal">
  <div class="modal-header">
    <div>
      <p class="modal-eyebrow">Device thresholds</p>
      <h2 class="modal-title">Configure limits</h2>
    </div>
    <button type="button" class="close-button" (click)="cancel()" aria-label="Close thresholds">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </div>

  <div class="modal-body">
    <div class="loading-overlay" *ngIf="loading">
      <mat-spinner diameter="28"></mat-spinner>
      <span>Loading thresholds...</span>
    </div>

    <div class="threshold-grid" [class.is-loading]="loading">
      <div
        *ngFor="let cfg of thresholdDefinitions"
        class="threshold-row"
        [formGroup]="getMetricForm(cfg.metric)"
      >
        <div class="threshold-meta">
          <div class="threshold-label">{{ metricDetails(cfg.metric).label }}</div>
          <div class="threshold-support">
            <span class="threshold-unit">{{ metricDetails(cfg.metric).unit }}</span>
            <span class="threshold-state" *ngIf="hasThreshold(cfg.metric); else emptyState">Configured</span>
            <ng-template #emptyState>
              <span class="threshold-state threshold-state--empty">Not configured</span>
            </ng-template>
          </div>
        </div>

        <mat-form-field appearance="outline" class="threshold-input">
          <mat-label>Value</mat-label>
          <input matInput type="number" formControlName="value" [step]="cfg.metric.includes('temperature') ? 0.1 : 1" />
        </mat-form-field>

        <mat-checkbox class="threshold-toggle" formControlName="enabled">Enabled</mat-checkbox>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button class="footer-button footer-button--secondary" type="button" (click)="reset()" [disabled]="saving || loading">
      RESET
    </button>
    <button class="footer-button footer-button--primary" type="button" (click)="save()" [disabled]="saving || loading || form.invalid">
      <span *ngIf="!saving">SAVE</span>
      <span *ngIf="saving">SAVING...</span>
    </button>
  </div>
</div>
