<h2 mat-dialog-title>Vincular dispositivo</h2>
<mat-dialog-content>
  <div class="device-list">
    <label *ngFor="let device of data.devices; trackBy: trackByDeviceId" class="device-option">
      <input type="radio" name="device" [value]="device.id.value" [(ngModel)]="selectedDeviceId" />
      <div>
        <strong>{{ device.serialNumber }}</strong>
        <p>{{ device.name }}</p>
      </div>
      <span>{{ device.status }}</span>
    </label>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!selectedDeviceId" (click)="submit()">Vincular</button>
</mat-dialog-actions>
