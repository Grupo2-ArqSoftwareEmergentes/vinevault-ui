<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="name" placeholder="Cava Principal" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripcion</mat-label>
      <textarea matInput rows="3" formControlName="description" placeholder="Cava para tintos"></textarea>
    </mat-form-field>

    <section class="device-section">
      <p class="section-label">Vincular dispositivo</p>
      <div *ngIf="loadingDevices" class="loading-row">
        <mat-spinner diameter="18"></mat-spinner>
        <span>Cargando devices...</span>
      </div>
      <div *ngIf="errorDevices && !loadingDevices" class="error">{{ errorDevices }}</div>
      <mat-radio-group *ngIf="!loadingDevices" class="device-options" formControlName="deviceId">
        <mat-radio-button [value]="null">Sin dispositivo</mat-radio-button>
        <mat-radio-button *ngFor="let device of devices; trackBy: trackByDeviceId" [value]="device.id.value">
          <span class="device-title">{{ device.serialNumber }}</span>
          <span class="device-subtitle">{{ device.name }}</span>
        </mat-radio-button>
      </mat-radio-group>
    </section>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" [disabled]="form.invalid" (click)="submit()">{{ data.submitLabel }}</button>
</mat-dialog-actions>
