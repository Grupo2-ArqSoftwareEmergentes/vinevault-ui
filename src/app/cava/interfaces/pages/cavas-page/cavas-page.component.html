<div class="page-layout">
  <app-header [isSidebarOpen]="isSidebarOpen" (sidebarToggleRequested)="toggleSidebar()"></app-header>

  <div class="page-body">
    <app-sidebar [isOpen]="isSidebarOpen" (closeRequested)="closeSidebar()"></app-sidebar>

    <main class="content">
      <div class="workspace">
        <div class="desktop-organizations-panel">
          <app-organizations-panel
            [countMode]="'cavas'"
            [selectedSpaceId]="selectedSpace?.id?.value ?? null"
            (spaceSelected)="selectSpace($event)"
            (selectedSpaceCleared)="clearSelectedSpace()"
          ></app-organizations-panel>
        </div>

        <section class="detail-panel">
          <!-- Mobile context bar -->
          <div class="mobile-context-bar">
            <button class="context-button" type="button" (click)="openOrganizationsDrawer()" aria-label="Change organization or space">
              <span class="context-eyebrow">Current space</span>
              <span class="context-name">{{ selectedSpace?.name ?? 'Select a space' }}</span>
              <mat-icon>expand_more</mat-icon>
            </button>
          </div>

          <div *ngIf="!selectedSpace" class="empty-state centered">
            Select an organization with spaces to view cavas.
          </div>

          <ng-container *ngIf="selectedSpace">
            <app-space-detail-cava-header
              [space]="selectedSpace"
              (createCavaRequested)="openCreateWineCellarDialog()"
            ></app-space-detail-cava-header>

            <div *ngIf="loadingWineCellars" class="state-row">
              <mat-spinner diameter="22"></mat-spinner>
              <span>Cargando cavas...</span>
            </div>

            <div *ngIf="errorWineCellars && !loadingWineCellars" class="state-row error">{{ errorWineCellars }}</div>

            <div *ngIf="!loadingWineCellars && wineCellars.length === 0" class="state-row">
              No hay cavas registradas en este espacio.
            </div>

            <div *ngIf="!loadingWineCellars && wineCellars.length > 0" class="cava-list">
              <article
                *ngFor="let cellar of wineCellars; trackBy: trackByCellarId"
                class="cava-card"
                [class.selected]="selectedWineCellarId === cellar.id.value"
                (click)="selectWineCellar(cellar)"
              >
                <div class="cava-main">
                  <div>
                    <h4>{{ cellar.name }}</h4>
                    <p>{{ cellar.description || 'Sin descripcion' }}</p>
                  </div>
                  <span class="device-pill">{{ linkedDeviceName(cellar) }}</span>
                </div>

                <div class="cava-actions" *ngIf="selectedWineCellarId === cellar.id.value">
                  <button mat-button type="button" (click)="openEditWineCellarDialog(cellar); $event.stopPropagation()">
                    Editar
                  </button>
                  <button mat-button type="button" (click)="deleteWineCellar(cellar); $event.stopPropagation()">
                    Eliminar
                  </button>
                </div>
              </article>
            </div>
          </ng-container>
        </section>
      </div>
    </main>
  </div>
</div>

<!-- Organizations drawer (mismo que en devices) -->
<div *ngIf="isOrganizationsDrawerOpen" class="organizations-drawer-backdrop open" (click)="closeOrganizationsDrawer()"></div>
<aside *ngIf="isOrganizationsDrawerOpen" class="organizations-drawer open" aria-label="Organizations and spaces">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div>
      <p class="drawer-eyebrow">Workspace</p>
      <h2>Organizations</h2>
    </div>
    <button mat-icon-button type="button" class="drawer-close-button" (click)="closeOrganizationsDrawer()" aria-label="Close organizations">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <app-organizations-panel
    [countMode]="'cavas'"
    [selectedSpaceId]="selectedSpace?.id?.value ?? null"
    (spaceSelected)="selectSpace($event)"
    (selectedSpaceCleared)="clearSelectedSpace()"
  ></app-organizations-panel>
</aside>
